<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8E8E93" />
      <stop offset="100%" stop-color="#3A3A3C" />
    </linearGradient>

    <style>
      .title {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 56px;
        font-weight: 800;
        letter-spacing: -2px;
        fill: #1D1D1F; /* Cor exata do texto escuro da Apple */
      }
      .subtitle {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 24px;
        font-weight: 500;
        letter-spacing: -0.5px;
        fill: url(#textGradient);
      }
      .description {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 16px;
        font-weight: 400;
        fill: #86868B; /* Cinza secundário da Apple */
      }
      
      /* Opcional: Uma leve animação de fade-in para dar um toque de classe */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animated {
        animation: fadeIn 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }
    </style>
  </defs>

  <g class="animated">
    <text x="50%" y="40%" dominant-baseline="middle" text-anchor="middle" class="title">Eduardo Paim.</text>
    <text x="50%" y="62%" dominant-baseline="middle" text-anchor="middle" class="subtitle">Software Engineer.</text>
    <text x="50%" y="82%" dominant-baseline="middle" text-anchor="middle" class="description">Crafting robust architectures and elegant interfaces.</text>
  </g>
</svg>
